<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastel Task Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-default: #fdfdfd; --text: #2d3436; --green: #00b894; --yellow: #f1c40f; --gray: #b2bec3; --light: #f1f3f5; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-default);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; transition: background 0.5s; 
        }
        
        .container { width: 100%; max-width: 450px; background: rgba(255,255,255,0.95); padding: 30px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.03); position: relative; margin-top: 50px; backdrop-filter: blur(10px); }
        
        .top-bar { position: absolute; top: -40px; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }
        #clock { font-size: 1rem; font-weight: 600; color: var(--text); }
        .edit-theme-btn { cursor: pointer; color: #b2bec3; font-size: 1rem; transition: 0.3s; }

        h2 { font-weight: 800; margin-bottom: 25px; text-align: center; color: var(--text); }
        
        .input-box { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; background: rgba(241,243,245,0.8); padding: 20px; border-radius: 20px; }
        input, select { padding: 12px; border: 1px solid #e0e0e0; border-radius: 12px; font-size: 0.9rem; outline: none; background: #fff; }
        .date-group { display: flex; gap: 10px; }
        .date-group input { flex: 1; }
        .add-btn { background: var(--text); color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; font-weight: 600; }

        .task-list { margin-top: 20px; }
        .task-item { background: rgba(255,255,255,0.8); border: 1px solid #f1f1f1; padding: 18px; border-radius: 18px; margin-bottom: 12px; position: relative; }
        .task-name { font-weight: 600; font-size: 1rem; margin-bottom: 8px; display: block; }
        .task-meta { font-size: 0.75rem; color: var(--gray); display: flex; align-items: center; gap: 12px; }
        .status-badge { font-size: 0.65rem; padding: 4px 10px; border-radius: 8px; color: white; font-weight: 700; text-transform: uppercase; }
        .status-yet { background: var(--gray); }
        .status-doing { background: var(--yellow); }
        .status-done { background: var(--green); }
        .delete-btn { position: absolute; right: 18px; top: 18px; color: #fab1a0; cursor: pointer; }

        .save-cloud-btn { width: 100%; background: var(--green); color: white; border: none; padding: 16px; border-radius: 15px; font-weight: 600; cursor: pointer; margin-top: 15px; }

        .settings-footer { margin-top: 40px; padding-top: 20px; border-top: 1px dashed #eee; }
        .url-input { width: 100%; padding: 8px 12px; font-size: 0.75rem; border: 1px solid #f1f1f1; border-radius: 8px; background: #fafafa; box-sizing: border-box; }

        .theme-modal { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .theme-box { width: 300px; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .pastel-picker { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 20px 0; }
        .color-dot { width: 100%; aspect-ratio: 1; border-radius: 10px; cursor: pointer; border: 1px solid #eee; }
        .upload-area { margin-top: 15px; padding: 15px; border: 2px dashed #eee; border-radius: 15px; cursor: pointer; font-size: 0.8rem; color: #b2bec3; }
    </style>
</head>
<body id="bodyBg">

<div class="container">
    <div class="top-bar">
        <div id="clock">00:00</div>
        <i class="fas fa-pencil-alt edit-theme-btn" onclick="openTheme()"></i>
    </div>

    <h2>📌 ติดตามงาน</h2>

    <div class="input-box">
        <input type="text" id="taskTitle" placeholder="หัวข้องาน...">
        <select id="taskStatus">
            <option value="ยังไม่ทำ">⚪ ยังไม่ทำ</option>
            <option value="เริ่มทำ">🟡 เริ่มทำ</option>
            <option value="ทำแล้ว">🟢 ทำแล้ว</option>
        </select>
        <div class="date-group">
            <input type="text" id="dateStart" placeholder="เริ่ม (24/03)">
            <input type="text" id="dateEnd" placeholder="เสร็จ (26/03)">
        </div>
        <button class="add-btn" onclick="addTask()">เพิ่มลงตาราง</button>
    </div>

    <div class="task-list" id="taskList"></div>

    <button class="save-cloud-btn" onclick="sendToSheet()">บันทึกลง Google Sheets</button>
    <p id="msg" style="font-size: 0.8rem; color: #b2bec3; margin-top: 10px; text-align: center;"></p>

    <div class="settings-footer">
        <input type="text" id="urlConfig" class="url-input" placeholder="Google Script URL..." onchange="saveURL()">
    </div>
</div>

<div id="themeModal" class="theme-modal">
    <div class="theme-box">
        <h3>🎨 ปรับแต่งธีม</h3>
        <div class="pastel-picker">
            <div class="color-dot" style="background:#fdfdfd" onclick="setPastel('#fdfdfd')"></div>
            <div class="color-dot" style="background:#FFEDF2" onclick="setPastel('#FFEDF2')"></div>
            <div class="color-dot" style="background:#E6F3FF" onclick="setPastel('#E6F3FF')"></div>
            <div class="color-dot" style="background:#EBFEEA" onclick="setPastel('#EBFEEA')"></div>
            <div class="color-dot" style="background:#FFF9E6" onclick="setPastel('#FFF9E6')"></div>
        </div>
        <div class="upload-area" onclick="document.getElementById('bgUpload').click()">อัปโหลดรูปพื้นหลัง</div>
        <input type="file" id="bgUpload" accept="image/*" style="display:none" onchange="handleBgUpload(this)">
        <button onclick="closeTheme()" style="margin-top:15px; border:none; background:none; cursor:pointer; color:var(--gray)">ปิด</button>
    </div>
</div>

<script>
    let tasks = JSON.parse(localStorage.getItem('tasks_v4')) || [];
    let scriptURL = localStorage.getItem('url_v4') || "";
    let savedBg = localStorage.getItem('bg_v4') || "#fdfdfd";
    let isImg = localStorage.getItem('isImg_v4') === 'true';

    function updateTime() {
        const d = new Date();
        document.getElementById('clock').innerText = d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
    }
    setInterval(updateTime, 1000); updateTime();

    function applyTheme() {
        const b = document.getElementById('bodyBg');
        if (isImg) { b.style.backgroundImage = `url(${savedBg})`; b.style.backgroundColor = ""; }
        else { b.style.backgroundColor = savedBg; b.style.backgroundImage = ""; }
        localStorage.setItem('bg_v4', savedBg); localStorage.setItem('isImg_v4', isImg);
    }

    function openTheme() { document.getElementById('themeModal').style.display = 'flex'; }
    function closeTheme() { document.getElementById('themeModal').style.display = 'none'; }
    function setPastel(c) { isImg = false; savedBg = c; applyTheme(); }
    function handleBgUpload(i) {
        if (i.files && i.files[0]) {
            const r = new FileReader();
            r.onload = e => { isImg = true; savedBg = e.target.result; applyTheme(); };
            r.readAsDataURL(i.files[0]);
        }
    }

    function renderTasks() {
        const l = document.getElementById('taskList'); l.innerHTML = "";
        tasks.forEach((t, i) => {
            let s = t.status === 'ทำแล้ว' ? 'status-done' : (t.status === 'เริ่มทำ' ? 'status-doing' : 'status-yet');
            l.innerHTML += `<div class="task-item"><span class="task-name">${t.title}</span><div class="task-meta"><span class="status-badge ${s}">${t.status}</span> 🗓️ ${t.start}-${t.end}</div><i class="fas fa-times delete-btn" onclick="deleteTask(${i})"></i></div>`;
        });
        localStorage.setItem('tasks_v4', JSON.stringify(tasks));
    }

    function addTask() {
        const title = document.getElementById('taskTitle').value;
        if (!title) return;
        tasks.push({ title, status: document.getElementById('taskStatus').value, start: document.getElementById('dateStart').value, end: document.getElementById('dateEnd').value });
        renderTasks();
    }

    function deleteTask(i) { tasks.splice(i, 1); renderTasks(); }
    function saveURL() { scriptURL = document.getElementById('urlConfig').value; localStorage.setItem('url_v4', scriptURL); }

    async function sendToSheet() {
        if (!scriptURL) return alert("ใส่ URL ด้านล่างก่อนครับ");
        document.getElementById('msg').innerText = "กำลังส่ง...";
        try {
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ taskData: tasks }) });
            document.getElementById('msg').innerText = "✅ บันทึกสำเร็จ";
        } catch (e) { document.getElementById('msg').innerText = "❌ ผิดพลาด"; }
    }

    document.getElementById('urlConfig').value = scriptURL;
    applyTheme(); renderTasks();
</script>
</body>
</html>
