<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>namtip - Task Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --p: #ffccd5; --pd: #ffb3c1; --t: #262626; --g: #8e8e8e; }
        body { font-family: sans-serif; margin: 0; background: #fafafa; background-size: cover; background-position: center; background-attachment: fixed; padding-bottom: 80px; }
        .h { width: 100%; background: white; padding: 10px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; z-index: 1000; box-sizing: border-box; }
        .logo { font-size: 1.2rem; font-weight: bold; font-style: italic; }
        .h i { cursor: pointer; margin-left: 15px; font-size: 1.1rem; }
        .main { max-width: 450px; margin: 70px auto 0; padding: 15px; position: relative; z-index: 10; }
        .card { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-radius: 15px; border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        /* Profile */
        .cover { width: 100%; height: 110px; background: #eee; border-radius: 10px; cursor: pointer; background-size: cover; background-position: center; border: 1px solid #ddd; }
        .p-pic { width: 75px; height: 75px; border-radius: 50%; border: 3px solid white; background: #ccc; position: absolute; top: 75px; left: 25px; cursor: pointer; overflow: hidden; z-index: 20; }
        .p-pic img { width: 100%; height: 100%; object-fit: cover; }
        .p-info { margin-top: 45px; padding-left: 10px; }

        /* Form */
        label { font-size: 0.8rem; font-weight: bold; display: block; margin-bottom: 5px; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; font-size: 1rem; }
        #taskTitle { border: 2px dashed var(--pd); background: #fff; }
        .btn-add { width: 100%; padding: 14px; background: var(--p); border: none; border-radius: 10px; font-weight: bold; color: #7d5a5a; cursor: pointer; font-size: 1rem; }
        .btn-add:hover { background: var(--pd); }

        /* Task List */
        .t-item { background: white; padding: 15px; border-radius: 12px; border: 1px solid #eee; margin-bottom: 12px; position: relative; animation: fadeIn 0.3s ease; }
        .bdg { font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; color: white; background: var(--g); font-weight: bold; }
        .bdg.done { background: #2ecc71; }
        .del { position: absolute; right: 15px; top: 15px; color: #ddd; cursor: pointer; font-size: 1.1rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Modals */
        .m { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .m-in { background: white; padding: 25px; border-radius: 25px; width: 85%; max-width: 300px; text-align: center; }

        .f { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: white; padding: 15px; text-align: center; font-size: 0.8rem; color: var(--g); border-top: 1px solid #eee; z-index: 100; }
    </style>
</head>
<body id="bBody">

<div class="h">
    <div class="logo">namtip</div>
    <div>
        <i class="fas fa-paper-plane" onclick="sendToSheet()"></i>
        <i class="fas fa-pencil-alt" onclick="shM('tM')"></i>
        <i class="fas fa-bars" onclick="shM('uM')"></i>
    </div>
</div>

<div class="main">
    <div class="card" style="padding:0; overflow:hidden;">
        <div class="cover" id="dCov" onclick="document.getElementById('iCov').click()"></div>
        <div class="p-pic" onclick="document.getElementById('iProf').click()">
            <img id="dProf" src="https://via.placeholder.com/150?text=Profile">
        </div>
        <div class="p-info">
            <div style="padding:15px">
                <strong>namtip</strong><br>
                <small style="color:var(--g)">@namtip.p</small>
            </div>
        </div>
    </div>

    <div class="card">
        <label>หัวข้องาน (ต้องพิมพ์ตรงนี้ก่อนนะคะ)</label>
        <input type="text" id="taskTitle" placeholder="พิมพ์ชื่อหัวข้องาน...">
        <label>สถานะ</label>
        <select id="taskStatus">
            <option>ยังไม่ทำ</option>
            <option>เริ่มทำ</option>
            <option>ทำแล้ว</option>
        </select>
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>เริ่ม</label><input type="date" id="dS"></div>
            <div style="flex:1"><label>เสร็จ</label><input type="date" id="dE"></div>
        </div>
        <button class="btn-add" id="addBtn">+ เพิ่มลงตาราง</button>
    </div>

    <div id="tList"></div>
    <div id="syncMsg" style="text-align:center; font-size:0.75rem; color:gray; margin-top:10px;"></div>
</div>

<input type="file" id="iCov" style="display:none" onchange="uploadFile(this, 'c')">
<input type="file" id="iProf" style="display:none" onchange="uploadFile(this, 'p')">
<input type="file" id="iBg" style="display:none" onchange="uploadFile(this, 'b')">

<div id="uM" class="m" onclick="if(event.target==this)clM()">
    <div class="m-in">
        <h4>🔗 ตั้งค่า URL สคริปต์</h4>
        <input type="text" id="uIn" placeholder="วาง Web App URL ที่นี่..." onchange="saveConfig()">
        <button class="btn-add" onclick="clM()">ตกลง</button>
    </div>
</div>

<div id="tM" class="m" onclick="if(event.target==this)clM()">
    <div class="m-in">
        <h4>🎨 ปรับแต่งธีม</h4>
        <button class="btn-add" style="margin-bottom:10px;" onclick="document.getElementById('iBg').click()">เปลี่ยนรูปพื้นหลังเว็บ</button>
        <button onclick="resetData()" style="width:100%; background:#eee; border:none; padding:10px; border-radius:10px; cursor:pointer;">ล้างข้อมูลทั้งหมด</button>
    </div>
</div>

<div class="f">@Rattana Garaked</div>

<script>
    const DB_KEY = "vNT_ULTRA_FIX";
    let db = {
        tasks: JSON.parse(localStorage.getItem(DB_KEY + '_tasks')) || [],
        url: localStorage.getItem(DB_KEY + '_url') || "",
        bg: localStorage.getItem(DB_KEY + '_bg') || "",
        pr: localStorage.getItem(DB_KEY + '_pr') || "",
        cv: localStorage.getItem(DB_KEY + '_cv') || ""
    };

    function shM(id) { document.getElementById(id).style.display = 'flex'; }
    function clM() { document.querySelectorAll('.m').forEach(m => m.style.display = 'none'); }

    function uploadFile(input, type) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                if(type==='c') db.cv = e.target.result;
                if(type==='p') db.pr = e.target.result;
                if(type==='b') db.bg = e.target.result;
                saveConfig();
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function saveConfig() {
        db.url = document.getElementById('uIn').value;
        localStorage.setItem(DB_KEY + '_tasks', JSON.stringify(db.tasks));
        localStorage.setItem(DB_KEY + '_url', db.url);
        localStorage.setItem(DB_KEY + '_bg', db.bg);
        localStorage.setItem(DB_KEY + '_pr', db.pr);
        localStorage.setItem(DB_KEY + '_cv', db.cv);
        render();
    }

    // แก้ปัญหา "เด้งหาย" โดยใช้ Event Listener แทนการใช้ onclick ในปุ่มตรงๆ
    document.getElementById('addBtn').addEventListener('click', function(event) {
        event.preventDefault(); // ป้องกันหน้าจอรีเฟรชเอง
        const t = document.getElementById('taskTitle').value;
        const s = document.getElementById('dS').value;
        const e = document.getElementById('dE').value;
        
        if(!t || !s || !e) {
            alert("กรอกข้อมูลให้ครบก่อนนะคะคุณน้ำทิพย์");
            return;
        }

        db.tasks.push({ title: t, status: document.getElementById('taskStatus').value, s, e });
        document.getElementById('taskTitle').value = ""; // ล้างช่องพิมพ์
        saveConfig();
    });

    function render() {
        // อัปเดตรูปภาพ
        document.getElementById('bBody').style.backgroundImage = db.bg ? `url(${db.bg})` : "none";
        document.getElementById('dProf').src = db.pr || "https://via.placeholder.com/150?text=Profile";
        const cvEl = document.getElementById('dCov');
        if(db.cv) cvEl.style.backgroundImage = `url(${db.cv})`;
        else cvEl.style.backgroundColor = "#eee";

        // วาดรายการงาน
        const list = document.getElementById('tList');
        list.innerHTML = "";
        db.tasks.forEach((item, i) => {
            let badgeClass = item.status === 'ทำแล้ว' ? 'done' : '';
            list.innerHTML += `<div class="t-item">
                <strong>${item.title}</strong><br>
                <div style="margin-top:8px;">
                    <span class="bdg ${badgeClass}">${item.status}</span>
                    <small style="color:gray; margin-left:8px;">🗓️ ${item.s} - ${item.e}</small>
                </div>
                <i class="fas fa-trash del" onclick="delTask(${i})"></i>
            </div>`;
        });
    }

    function delTask(i) {
        if(confirm("ลบงานนี้ใช่ไหมคะ?")) {
            db.tasks.splice(i, 1);
            saveConfig();
        }
    }

    async function sendToSheet() {
        if(!db.url) return alert("ยังไม่ได้ใส่ URL ค่ะ (กดปุ่ม ☰)");
        document.getElementById('syncMsg').innerText = "กำลังบันทึก...";
        try {
            await fetch(db.url, { method: 'POST', mode: 'no-cors', body: JSON.stringify({taskData: db.tasks}) });
            document.getElementById('syncMsg').innerText = "✅ บันทึกสำเร็จ!";
            setTimeout(() => document.getElementById('syncMsg').innerText = "", 3000);
        } catch(e) { alert("เกิดข้อผิดพลาด"); }
    }

    function resetData() { if(confirm("ล้างข้อมูลและรูปทั้งหมด?")) { localStorage.clear(); location.reload(); } }

    document.getElementById('uIn').value = db.url;
    render();
</script>
</body>
</html>
