<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>namtip - work-hours</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --p: #ffccd5; --pd: #ffb3c1; --t: #262626; --g: #8e8e8e; --ib: #0095f6; }
        body { font-family: sans-serif; margin: 0; background: #fafafa; background-size: cover; background-position: center; background-attachment: fixed; padding-bottom: 80px; }
        
        /* Header Fix */
        .h { width: 100%; background: white; padding: 10px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; z-index: 9999; box-sizing: border-box; }
        .logo { font-size: 1.3rem; font-weight: bold; font-style: italic; color: var(--t); }
        .h-icons i { cursor: pointer; margin-left: 15px; font-size: 1.1rem; position: relative; z-index: 10000; }

        .main { max-width: 450px; margin: 70px auto 0; padding: 15px; position: relative; }
        
        /* Profile Block */
        .card { background: rgba(255,255,255,0.95); border-radius: 15px; border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .cover { width: 100%; height: 110px; background: #eee; border-radius: 10px; cursor: pointer; background-size: cover; background-position: center; }
        .p-pic { width: 75px; height: 75px; border-radius: 50%; border: 3px solid white; background: #ccc; position: absolute; top: 75px; left: 25px; cursor: pointer; overflow: hidden; z-index: 5; }
        .p-pic img { width: 100%; height: 100%; object-fit: cover; }
        .p-info { margin-top: 45px; padding-left: 10px; }
        .p-name { font-weight: bold; font-size: 1.1rem; text-decoration: none; color: var(--t); }
        .p-tag { color: var(--g); font-size: 0.8rem; }

        /* Input Zone */
        label { font-size: 0.8rem; font-weight: bold; display: block; margin-bottom: 5px; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; font-size: 1rem; position: relative; z-index: 10; }
        #taskTitle { border: 2px dashed var(--pd); background: #fff; }
        .btn-add { width: 100%; padding: 14px; background: var(--p); border: none; border-radius: 10px; font-weight: bold; color: #7d5a5a; cursor: pointer; font-size: 1rem; position: relative; z-index: 20; }
        .btn-add:active { background: var(--pd); transform: scale(0.98); }

        /* Task List */
        .t-item { background: white; padding: 15px; border-radius: 12px; border: 1px solid #eee; margin-bottom: 12px; position: relative; }
        .bdg { font-size: 0.7rem; padding: 4px 10px; border-radius: 20px; color: white; background: var(--g); font-weight: bold; }
        .bdg.done { background: #2ecc71; }
        .del { position: absolute; right: 15px; top: 15px; color: #ddd; cursor: pointer; z-index: 30; }

        /* Modal Fix */
        .m { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .m-in { background: white; padding: 25px; border-radius: 20px; width: 80%; max-width: 300px; text-align: center; }

        .f { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; text-align: center; font-size: 0.8rem; color: var(--g); border-top: 1px solid #eee; z-index: 9000; }
    </style>
</head>
<body id="bBody">

<div class="h">
    <div class="logo">namtip</div>
    <div class="h-icons">
        <i class="fas fa-paper-plane" onclick="sendToSheet()"></i>
        <i class="fas fa-pencil-alt" onclick="shM('tM')"></i>
        <i class="fas fa-bars" onclick="shM('uM')"></i>
    </div>
</div>

<div class="main">
    <div class="card" style="padding:0; overflow:hidden;">
        <div class="cover" id="dCov" onclick="document.getElementById('iCov').click()"></div>
        <div class="p-pic" onclick="document.getElementById('iProf').click()">
            <img id="dProf" src="https://via.placeholder.com/150?text=namtip">
        </div>
        <div class="p-info">
            <div style="padding:15px">
                <a href="https://ksm-bb.github.io/work-hours/" class="p-name">work-hours</a><br>
                <span class="p-tag">@namtip.p</span>
            </div>
        </div>
    </div>

    <div class="card">
        <label>ชื่อหัวข้องาน (เส้นประ)</label>
        <input type="text" id="taskTitle" placeholder="พิมพ์ชื่อหัวข้องาน...">
        <label>สถานะ</label>
        <select id="taskStatus">
            <option>ยังไม่ทำ</option>
            <option>เริ่มทำ</option>
            <option>ทำแล้ว</option>
        </select>
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>เริ่ม</label><input type="date" id="dS"></div>
            <div style="flex:1"><label>เสร็จ</label><input type="date" id="dE"></div>
        </div>
        <button class="btn-add" onclick="addTask()">+ เพิ่มลงตาราง</button>
    </div>

    <div id="tList"></div>
    <div id="syncMsg" style="text-align:center; color:gray; font-size:0.8rem;"></div>
</div>

<input type="file" id="iCov" style="display:none" onchange="upF(this, 'c')">
<input type="file" id="iProf" style="display:none" onchange="upF(this, 'p')">
<input type="file" id="iBg" style="display:none" onchange="upF(this, 'b')">

<div id="uM" class="m" onclick="if(event.target==this)clM()">
    <div class="m-in">
        <h4>⚙️ ตั้งค่าลิงก์</h4>
        <input type="text" id="uIn" placeholder="วาง Web App URL..." style="margin-bottom:10px;">
        <button class="btn-add" onclick="svU()">บันทึก</button>
    </div>
</div>

<div id="tM" class="m" onclick="if(event.target==this)clM()">
    <div class="m-in">
        <h4>🎨 ปรับแต่ง</h4>
        <button class="btn-add" style="margin-bottom:10px;" onclick="document.getElementById('iBg').click()">เปลี่ยนพื้นหลัง</button>
        <button onclick="resetAll()" style="background:none; border:none; color:red; cursor:pointer;">ล้างข้อมูลทั้งหมด</button>
