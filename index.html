<script>
    // เวอร์ชั่นของระบบเพื่อล้างค่าเก่าถ้าจำเป็น
    const VER = "vIG_2"; // <<<< แก้ไขให้เป็น vIG_2 เพื่อจำรูปภาพ
    let tasks = JSON.parse(localStorage.getItem('tasks_'+VER)) || [];
    let scriptURL = localStorage.getItem('url_'+VER) || "";
    
    // ตั้งค่าธีมเริ่มต้น (ใช้ vIG_2 ทั้งหมด)
    let savedBgColor = localStorage.getItem('bgColor_'+VER) || "#fafafa";
    let savedBgImage = localStorage.getItem('bgImage_'+VER) || ""; // เก็บ Base64 รูปพื้นหลัง
    let savedProfilePic = localStorage.getItem('profilePic_'+VER) || "https://via.placeholder.com/150?text=Profile";
    let savedCoverPhoto = localStorage.getItem('coverPhoto_'+VER) || "#eee";

    // --- Initial Load ---
    document.getElementById('urlConfig').value = scriptURL;
    applySavedTheme();
    renderTasks();

    // --- URL Config Logic (ปุ่มสามขีด) ---
    function toggleUrlConfig() {
        const modal = document.getElementById('urlModal');
        modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
    }
    function closeUrlConfig(event) {
        if (event.target === document.getElementById('urlModal')) {
            toggleUrlConfig();
        }
    }
    function saveURL() {
        scriptURL = document.getElementById('urlConfig').value;
        localStorage.setItem('url_'+VER, scriptURL);
    }

    // --- Theme & Image Logic (ปุ่มดินสอ) ---
    function openTheme() { document.getElementById('themeModal').style.display = 'flex'; }
    function closeTheme() { document.getElementById('themeModal').style.display = 'none'; }

    // เลือกสีพื้นหลัง
    function setPastel(color) {
        savedBgImage = ""; // ล้างรูปพื้นหลังถ้าเลือกสี
        savedBgColor = color;
        applySavedTheme();
    }

    // อัปโหลดรูปพื้นหลัง
    function handleBgUpload(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                savedBgColor = ""; // ล้างสีถ้าเลือกรูป
                savedBgImage = e.target.result;
                applySavedTheme();
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    // จัดการอัปโหลดรูป (โปรไฟล์/ปก)
    function handleImageUpload(input, type) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                if (type === 'profile') {
                    savedProfilePic = e.target.result;
                } else if (type === 'cover') {
                    savedCoverPhoto = e.target.result;
                }
                applySavedTheme();
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    // นำการตั้งค่าธีมมาใช้
    function applySavedTheme() {
        const body = document.getElementById('bodyBg');
        // พื้นหลังหลัก (รูปภาพชนะสี)
        if (savedBgImage) {
            body.style.backgroundImage = `url(${savedBgImage})`;
            body.style.backgroundColor = "";
        } else {
            body.style.backgroundImage = "";
            body.style.backgroundColor = savedBgColor;
        }

        // รูปโปรไฟล์
        document.getElementById('profilePic').src = savedProfilePic;
        
        // รูปปก
        const coverEl = document.getElementById('coverPhoto');
        if (savedCoverPhoto.startsWith('data:image')) {
            coverEl.style.backgroundImage = `url(${savedCoverPhoto})`;
            coverEl.style.backgroundColor = "";
        } else {
            coverEl.style.backgroundImage = "";
            coverEl.style.backgroundColor = savedCoverPhoto;
        }
        
        // บันทึกถาวร (ใช้ vIG_2 ทั้งหมด)
        localStorage.setItem('bgColor_'+VER, savedBgColor);
        localStorage.setItem('bgImage_'+VER, savedBgImage);
        localStorage.setItem('profilePic_'+VER, savedProfilePic);
        localStorage.setItem('coverPhoto_'+VER, savedCoverPhoto);
    }

    // รีเซ็ตธีม
    function resetTheme() {
        if(confirm("ต้องการรีเซ็ตการตั้งค่าธีมและรูปภาพทั้งหมดใช่ไหม?")) {
            savedBgColor = "#fafafa";
            savedBgImage = "";
            savedProfilePic = "https://via.placeholder.com/150?text=Profile";
            savedCoverPhoto = "#eee";
            applySavedTheme();
        }
    }

    // --- Task Logic (เดิม) ---
    // ฟังก์ชันจัดรูปแบบวันที่ (dd/mm/yyyy พ.ศ.)
    function formatDateTh(dateStr) {
        if(!dateStr) return "";
        const d = new Date(dateStr);
        const day = d.getDate().toString().padStart(2, '0');
        const month = (d.getMonth() + 1).toString().padStart(2, '0');
        const yearTh = d.getFullYear() + 543; // เปลี่ยนเป็น พ.ศ.
        return `${day}/${month}/${yearTh}`;
    }

    function renderTasks() {
        const list = document.getElementById('taskList');
        list.innerHTML = "";
        tasks.forEach((t, index) => {
            let sClass = t.status === 'ทำแล้ว' ? 'status-done' : (t.status === 'เริ่มทำ' ? 'status-doing' : 'status-yet');
            list.innerHTML += `
                <div class="task-item">
                    <div class="task-header">
                        <span class="task-name">${t.title}</span>
                        <i class="fas fa-ellipsis-h delete-btn" onclick="deleteTask(${index})" title="ลบรายการ"></i>
                    </div>
                    <div class="task-meta">
                        <span class="status-badge ${sClass}">${t.status}</span>
                        <span>🗓️ ${formatDateTh(t.start)} - ${formatDateTh(t.end)}</span>
                    </div>
                </div>
            `;
        });
        localStorage.setItem('tasks_'+VER, JSON.stringify(tasks));
    }

    function addTask() {
        const title = document.getElementById('taskTitle').value;
        const start = document.getElementById('dateStart').value;
        const end = document.getElementById('dateEnd').value;
        if (!title) return alert("ระบุชื่องานด้วยครับ");
        if (!start || !end) return alert("ระบุวันที่เริ่มและเสร็จด้วยครับ");

        tasks.push({ 
            title, 
            status: document.getElementById('taskStatus').value, 
            start, 
            end 
        });
        renderTasks();
        // ล้างค่า
        document.getElementById('taskTitle').value = "";
        document.getElementById('dateStart').value = "";
        document.getElementById('dateEnd').value = "";
    }

    function deleteTask(index) {
        if(confirm("ลบรายการงานนี้ใช่ไหม?")) {
            tasks.splice(index, 1);
            renderTasks();
        }
    }

    async function sendToSheet() {
        if (!scriptURL) return alert("กรุณาใส่ URL ที่ปุ่มสามขีด (☰) ด้านบนก่อนครับ");
        if (tasks.length === 0) return alert("ไม่มีข้อมูลงานให้ส่งครับ");
        
        const sendBtn = document.getElementById('sendBtn');
        const msg = document.getElementById('msg');
        
        // สถานะกำลังส่ง
        sendBtn.style.color = "var(--ig-blue)";
        msg.innerText = "กำลังส่งข้อมูลเข้า Google Sheets...";
        
        try {
            await fetch(scriptURL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({ taskData: tasks }) 
            });
            msg.innerText = "✅ บันทึกสำเร็จแล้วค่ะ!";
            sendBtn.style.color = "var(--green)";
            setTimeout(() => { 
                msg.innerText = ""; 
                sendBtn.style.color = "var(--gray)";
            }, 3000);
        } catch (e) { 
            alert("Error: ส่งข้อมูลไม่สำเร็จ"); 
            msg.innerText = ""; 
            sendBtn.style.color = "var(--gray)";
        }
    }
</script>
