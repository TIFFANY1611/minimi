<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>namtip 🍅 work-hours</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #E3F2FD; --main: #4FC3F7; --dark: #0277BD; --white: #FFFFFF;
            --border: #efefef; --gray: #8e8e8e; --text: #262626;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mitr', sans-serif; }

        body { 
            background: var(--bg); background-size: cover; background-position: center;
            background-attachment: fixed; min-height: 100vh; padding-top: 70px; padding-bottom: 80px;
            position: relative; overflow-x: hidden;
        }

        /* --- 🍅 Background ฝูงมะเขือเทศฟุ้งๆ --- */
        .bg-tomatoes {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1; /* อยู่หลังสุด */
            pointer-events: none; opacity: 0.6; /* ปรับความจาง */
        }

        .tomato-emoji {
            position: absolute;
            animation: tomatoFloat infinite linear;
            will-change: transform, opacity;
        }

        @keyframes tomatoFloat {
            0% { transform: translateY(110vh) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) translateX(20px) rotate(360deg); opacity: 0; }
        }

        /* --- Header Fix (จุดที่เคยกดไม่ได้) --- */
        .h { 
            width: 100%; max-width: 600px; background: white; height: 60px;
            border-bottom: 1px solid var(--border); display: flex; 
            justify-content: space-between; align-items: center; 
            position: fixed; top: 0; left: 50%; transform: translateX(-50%); 
            z-index: 999999; padding: 0 20px;
        }
        .ig-logo { font-size: 1.4rem; font-weight: 500; font-style: italic; color: var(--text); }
        .h-icons i { padding: 12px; cursor: pointer; font-size: 1.2rem; color: var(--text); position: relative; z-index: 1000000; }
        .h-icons i:active { opacity: 0.5; transform: scale(0.9); }

        .main { width: 100%; max-width: 480px; margin: 0 auto; padding: 15px; position: relative; z-index: 10; }

        /* --- Profile Card --- */
        .card { background: rgba(255,255,255,0.9); border-radius: 20px; border: 1px solid var(--border); padding: 15px; margin-bottom: 20px; position: relative; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .cover { width: 100%; height: 120px; background: #eee; border-radius: 15px; cursor: pointer; background-size: cover; background-position: center; }
        .p-pic { width: 85px; height: 85px; border-radius: 50%; border: 4px solid white; background: white; position: absolute; top: 85px; left: 25px; cursor: pointer; overflow: hidden; z-index: 20; }
        .p-pic img { width: 100%; height: 100%; object-fit: cover; }
        .p-info { margin-top: 55px; padding: 10px; }
        .p-name { font-weight: 500; font-size: 1.2rem; text-decoration: none; color: var(--dark); }
        .p-tag { color: var(--gray); font-size: 0.85rem; }

        /* --- Form --- */
        label { font-size: 0.85rem; font-weight: 400; display: block; margin-bottom: 5px; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--main); border-radius: 12px; margin-bottom: 15px; font-size: 1rem; background: var(--white); }
        #taskTitle { border: 2px dashed var(--main); }
        .btn-add { width: 100%; padding: 15px; background: var(--main); border: none; border-radius: 15px; font-weight: 500; color: white; cursor: pointer; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(79,195,247,0.4); }

        /* --- Task List --- */
        .t-item { background: white; padding: 18px; border-radius: 18px; border: 1px solid #e0f2f1; margin-bottom: 15px; position: relative; }
        .bdg { font-size: 0.75rem; padding: 4px 12px; border-radius: 20px; color: white; background: var(--gray); font-weight: 400; }
        .bdg.done { background: #00b894; }
        .del { position: absolute; right: 15px; top: 15px; color: #ddd; cursor: pointer; padding: 5px; }

        /* --- Modals --- */
        .m { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .m-in { background: white; padding: 30px; border-radius: 25px; width: 85%; max-width: 320px; text-align: center; }

        .f { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; text-align: center; font-size: 0.8rem; color: var(--gray); border-top: 1px solid var(--border); z-index: 100; }
    </style>
</head>
<body id="bBody">

<div class="bg-tomatoes" id="tomatoLayer"></div>

<div class="h">
    <div class="logo">namtip</div>
    <div class="h-icons">
        <i class="fas fa-paper-plane" onclick="sendToSheet()"></i>
        <i class="fas fa-pencil-alt" onclick="shM('tM')"></i>
        <i class="fas fa-bars" onclick="shM('uM')"></i>
    </div>
</div>

<div class="main">
    <div class="card" style="padding:0; overflow:hidden;">
        <div class="cover" id="dCov" onclick="document.getElementById('iCov').click()"></div>
        <div class="p-pic" onclick="document.getElementById('iProf').click()">
            <img id="dProf" src="https://via.placeholder.com/150?text=namtip">
        </div>
        <div class="p-info">
            <div style="padding:15px">
                <a href="https://ksm-bb.github.io/work-hours/" class="p-name">work-hours</a><br>
                <span class="p-tag">@namtip.p</span>
            </div>
        </div>
    </div>

    <div class="card">
        <label>ชื่อหัวข้องาน 🍅</label>
        <input type="text" id="taskTitle" placeholder="พิมพ์ชื่อหัวข้องาน...">
        <label>สถานะ</label>
        <select id="taskStatus">
            <option>ยังไม่ทำ</option>
            <option>เริ่มทำ</option>
            <option>ทำแล้ว</option>
        </select>
        <div style="display:flex; gap:10px">
            <div style="flex:1;"><label>เริ่ม</label><input type="date" id="dS"></div>
            <div style="flex:1;"><label>เสร็จ</label><input type="date" id="dE"></div>
        </div>
        <button class="btn-add" onclick="addTask()">+ เพิ่มลงตาราง</button>
    </div>

    <div id="tList"></div>
    <p id="msg" style="text-align:center; color:var(--dark); font-size:0.8rem; height:20px; margin-top:10px;"></p>
</div>

<input type="file" id="iCov" style="display:none" onchange="upF(this, 'c')">
<input type="file" id="iProf" style="display:none" onchange="upF(this, 'p')">
<input type="file" id="iBg" style="display:none" onchange="upF(this, 'b')">

<div id="uM" class="m" onclick="if(event.target==this)clM()">
    <div class="m-in">
        <h4>⚙️ ตั้งค่าลิงก์</h4>
        <input type="text" id="uIn" placeholder="วาง Web App URL..." style="text-align:center;">
        <button class="btn-add" onclick="svU()">บันทึก</button>
    </div>
</div>

<div id="tM" class="m" onclick="if(event.target==this)clM()">
    <div class="m-in">
        <h4>🎨 ปรับแต่ง</h4>
        <button class="btn-add" style="margin-bottom:10px;" onclick="document.getElementById('iBg').click()">เปลี่ยนรูปพื้นหลังเว็บ</button>
        <button onclick="resetAll()" style="background:none; border:none; color:red; cursor:pointer; margin-top:15px;">ล้างข้อมูลทั้งหมด</button>
    </div>
</div>

<div class="f">@Rattana Garaked 2026</div>

<script>
    const K = "vNAMTIP_TOMATO_V1"; // เปลี่ยน Key ใหม่เพื่อให้ระบบดึงค่าใหม่
    let db = {
        tasks: JSON.parse(localStorage.getItem(K+'_t')) || [],
        url: localStorage.getItem(K+'_u') || "",
        bg: localStorage.getItem(K+'_b') || "",
        pr: localStorage.getItem(K+'_p') || "",
        cv: localStorage.getItem(K+'_c') || ""
    };

    function shM(id) { document.getElementById(id).style.display = 'flex'; }
    function clM() { document.querySelectorAll('.m').forEach(m => m.style.display = 'none'); }

    // --- 🍅 ระบบสร้างฝูงมะเขือเทศลอย ---
    function createTomatoes() {
        const layer = document.getElementById('tomatoLayer');
        const tomatoCount = 15; // จำนวนมะเขือเทศ
        const colors = ['rgba(255, 100, 100, 0.7)', 'rgba(255, 150, 150, 0.8)', 'rgba(255, 50, 50, 0.6)'];

        for (let i = 0; i < tomatoCount; i++) {
            const tomato = document.createElement('div');
            tomato.className = 'tomato-emoji';
            tomato.innerText = '🍅';
            
            // สุ่มขนาด (20px - 40px)
            const size = Math.random() * 20 + 20;
            tomato.style.fontSize = `${size}px`;
            
            // สุ่มตำแหน่งเริ่มต้นตามความกว้างหน้าจอ (0% - 100%)
            tomato.style.left = `${Math.random() * 100}%`;
            
            // สุ่มความเร็ว (10s - 25s)
            tomato.style.animationDuration = `${Math.random() * 15 + 10}s`;
            
            // สุ่มเวลาเริ่มต้น (delay) เพื่อไม่ให้ลอยพร้อมกัน
            tomato.style.animationDelay = `${Math.random() * 5}s`;

            layer.appendChild(tomato);
        }
    }

    // เรียกใช้งานฟังก์ชันสร้างมะเขือเทศ
    createTomatoes();

    // --- ระบบหลัก ---
    function upF(input, type) {
        if (input.files[0]) {
            const r = new FileReader();
            r.onload = (e) => {
                if(type==='c') db.cv = e.target.result;
                if(type==='p') db.pr = e.target.result;
                if(type==='b') db.bg = e.target.result;
                save();
            };
            r.readAsDataURL(input.files[0]);
        }
    }

    function svU() { db.url = document.getElementById('uIn').value; save(); clM(); }

    function save() {
        localStorage.setItem(K+'_t', JSON.stringify(db.tasks));
        localStorage.setItem(K+'_u', db.url);
        localStorage.setItem(K+'_b', db.bg);
        localStorage.setItem(K+'_p', db.pr);
        localStorage.setItem(K+'_c', db.cv);
        render();
    }

    function addTask() {
        const t = document.getElementById('taskTitle').value;
        const s = document.getElementById('dS').value;
        const e = document.getElementById('dE').value;
        if(!t || !s || !e) return alert("กรอกข้อมูลให้ครบก่อนนะคะคุณน้ำทิพย์");
        db.tasks.push({ title: t, status: document.getElementById('taskStatus').value, s, e });
        document.getElementById('taskTitle').value = "";
        save();
    }

    function delT(i) { if(confirm("ลบงานนี้?")) { db.tasks.splice(i, 1); save(); } }

    function render() {
        document.body.style.backgroundImage = db.bg ? `url(${db.bg})` : "none";
        document.getElementById('dProf').src = db.pr || "https://via.placeholder.com/150?text=namtip";
        const cv = document.getElementById('dCov');
        if(db.cv) cv.style.backgroundImage = `url(${db.cv})`; else cv.style.backgroundColor = "#eee";

        const list = document.getElementById('tList');
        list.innerHTML = "";
        db.tasks.forEach((item, i) => {
            let st = item.status === 'ทำแล้ว' ? 'done' : '';
            list.innerHTML += `<div class="t-item">
                <div style="font-weight:500; margin-bottom:5px;">${item.title}</div>
                <span class="bdg ${st}">${item.status}</span>
                <small style="color:gray; margin-left:10px;">🗓️ ${item.s} - ${item.e}</small>
                <i class="fas fa-trash del" onclick="delT(${i})"></i>
            </div>`;
        });
        document.getElementById('uIn').value = db.url;
    }

    async function sendToSheet() {
        if(!db.url) return alert("ยังไม่ได้ใส่ URL ค่ะ");
        document.getElementById('msg').innerText = "⏳ กำลังบันทึก...";
        try {
            await fetch(db.url, { method: 'POST', mode: 'no-cors', body: JSON.stringify({taskData: db.tasks}) });
            document.getElementById('msg').innerText = "✅ สำเร็จแล้วค่ะ!";
            setTimeout(() => document.getElementById('msg').innerText = "", 3000);
        } catch(err) { alert("ล้มเหลว"); }
    }

    function resetAll() { if(confirm("ล้างทั้งหมด?")) { localStorage.clear(); location.reload(); } }

    render();
</script>
</body>
</html>
