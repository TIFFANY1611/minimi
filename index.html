<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>namtip - work-hours</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --p: #ffccd5; --pd: #ffb3c1; --t: #262626; --g: #8e8e8e; }
        body { font-family: sans-serif; margin: 0; background: #fafafa; background-size: cover; background-position: center; background-attachment: fixed; padding-top: 70px; padding-bottom: 80px; }
        
        /* --- แก้ไข Header ให้จิ้มง่ายขึ้น --- */
        .h { 
            width: 100%; background: white; height: 60px;
            border-bottom: 1px solid #eee; display: flex; 
            justify-content: space-between; align-items: center; 
            position: fixed; top: 0; left: 0; z-index: 99999; 
            box-sizing: border-box; padding: 0 15px;
        }
        .logo { font-size: 1.4rem; font-weight: bold; font-style: italic; color: var(--t); }
        
        /* ขยายพื้นที่การจิ้มไอคอน */
        .h-icons { display: flex; align-items: center; }
        .h-icons i { 
            padding: 12px; /* เพิ่มพื้นที่ให้จิ้มโดนง่ายขึ้น */
            cursor: pointer; font-size: 1.2rem; color: var(--t);
            position: relative; z-index: 100000;
        }
        .h-icons i:active { opacity: 0.5; transform: scale(0.9); }

        /* --- Content --- */
        .main { max-width: 450px; margin: 0 auto; padding: 15px; position: relative; z-index: 1; }
        .card { background: rgba(255,255,255,0.95); border-radius: 15px; border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        /* Profile */
        .cover { width: 100%; height: 120px; background: #eee; border-radius: 10px; cursor: pointer; background-size: cover; background-position: center; border: 1px solid #ddd; }
        .p-pic { width: 80px; height: 80px; border-radius: 50%; border: 4px solid white; background: #ccc; position: absolute; top: 85px; left: 25px; cursor: pointer; overflow: hidden; z-index: 10; }
        .p-pic img { width: 100%; height: 100%; object-fit: cover; }
        .p-info { margin-top: 50px; padding-left: 10px; }
        .p-name { font-weight: bold; font-size: 1.2rem; text-decoration: none; color: var(--t); }
        .p-tag { color: var(--g); font-size: 0.85rem; }

        /* Form */
        label { font-size: 0.85rem; font-weight: bold; display: block; margin-bottom: 5px; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; font-size: 1rem; }
        #taskTitle { border: 2px dashed var(--pd); background: #fff; }
        .btn-add { width: 100%; padding: 15px; background: var(--p); border: none; border-radius: 12px; font-weight: bold; color: #7d5a5a; cursor: pointer; font-size: 1rem; }

        /* Task Item */
        .t-item { background: white; padding: 15px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 12px; position: relative; }
        .bdg { font-size: 0.7rem; padding: 4px 10px; border-radius: 20px; color: white; background: var(--g); font-weight: bold; text-transform: uppercase; }
        .bdg.done { background: #2ecc71; }
        .del { position: absolute; right: 15px; top: 15px; color: #ddd; cursor: pointer; padding: 5px; }

        /* Modal - แก้ให้ลอยทับทุกอย่าง */
        .m { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .m-in { background: white; padding: 30px; border-radius: 25px; width: 85%; max-width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }

        .f { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; text-align: center; font-size: 0.8rem; color: var(--g); border-top: 1px solid #eee; z-index: 1000; }
    </style>
</head>
<body id="bBody">

<div class="h">
    <div class="logo">namtip</div>
    <div class="h-icons">
        <i class="fas fa-paper-plane" onclick="sendToSheet()" title="ส่งข้อมูล"></i>
        <i class="fas fa-pencil-alt" onclick="shM('tM')" title="แต่งธีม"></i>
        <i class="fas fa-bars" onclick="shM('uM')" title="ตั้งค่า"></i>
    </div>
</div>

<div class="main">
    <div class="card" style="padding:0; overflow:hidden;">
        <div class="cover" id="dCov" onclick="document.getElementById('iCov').click()"></div>
        <div class="p-pic" onclick="document.getElementById('iProf').click()">
            <img id="dProf" src="https://via.placeholder.com/150?text=namtip">
        </div>
        <div class="p-info">
            <div style="padding:20px">
                <a href="https://ksm-bb.github.io/work-hours/" class="p-name">work-hours</a><br>
                <span class="p-tag">@namtip.p</span>
            </div>
        </div>
    </div>

    <div class="card">
        <label>ชื่อหัวข้องาน</label>
        <input type="text" id="taskTitle" placeholder="พิมพ์งานที่นี่...">
        <label>สถานะ</label>
        <select id="taskStatus">
            <option>ยังไม่ทำ</option>
            <option>เริ่มทำ</option>
            <option>ทำแล้ว</option>
        </select>
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>เริ่ม</label><input type="date" id="dS"></div>
            <div style="flex:1"><label>เสร็จ</label><input type="date" id="dE"></div>
        </div>
        <button class="btn-add" onclick="addTask()">+ เพิ่มลงตาราง</button>
    </div>

    <div id="tList"></div>
    <div id="syncMsg" style="text-align:center; color:var(--ig-blue); font-size:0.9rem; margin-top:10px; font-weight:bold;"></div>
</div>

<input type="file" id="iCov" style="display:none" onchange="upF(this, 'c')">
<input type="file" id="iProf" style="display:none" onchange="upF(this, 'p')">
<input type="file" id="iBg" style="display:none" onchange="upF(this, 'b')">

<div id="uM" class="m" onclick="if(event.target==this)clM()">
    <div class="m-in">
        <h3 style="margin-top:0;">⚙️ ตั้งค่าลิงก์</h3>
        <input type="text" id="uIn" placeholder="วาง Web App URL ตรงนี้..." style="text-align:center;">
        <button class="btn-add" onclick="svU()">บันทึกข้อมูล</button>
        <p style="font-size:0.7rem; color:gray; margin-top:10px;">(ใส่ลิงก์สคริปต์เพื่อให้ปุ่มจรวดทำงาน)</p>
    </div>
</div>

<div id="tM" class="m" onclick="if(event.target==this)clM()">
    <div class="m-in">
        <h3 style="margin-top:0;">🎨 ปรับแต่งธีม</h3>
        <button class="btn-add" style="margin-bottom:10px;" onclick="document.getElementById('iBg').click()">เปลี่ยนรูปพื้นหลังเว็บ</button>
        <button onclick="resetAll()" style="background:none; border:none; color:red; cursor:pointer; font-weight:bold; margin-top:15px;">ล้างข้อมูลและรูปทั้งหมด</button><br>
        <button onclick="clM()" style="margin-top:20px; border:none; background:none; color:gray;">ปิดหน้าต่าง</button>
    </div>
</div>

<div class="f">@Rattana Garaked 2026</div>

<script>
    const K = "vNAMTIP_ULTIMATE_V1"; 
    let db = {
        tasks: JSON.parse(localStorage.getItem(K+'_t')) || [],
        url: localStorage.getItem(K+'_u') || "",
        bg: localStorage.getItem(K+'_b') || "",
        pr: localStorage.getItem(K+'_p') || "",
        cv: localStorage.getItem(K+'_c') || ""
    };

    function shM(id) { document.getElementById(id).style.display = 'flex'; }
    function clM() { document.querySelectorAll('.m').forEach(m => m.style.display = 'none'); }

    function upF(input, type) {
        if (input.files[0]) {
            const r = new FileReader();
            r.onload = (e) => {
                if(type==='c') db.cv = e.target.result;
                if(type==='p') db.pr = e.target.result;
                if(type==='b') db.bg = e.target.result;
                save();
            };
            r.readAsDataURL(input.files[0]);
        }
    }

    function svU() { db.url = document.getElementById('uIn').value; save(); clM(); }

    function save() {
        localStorage.setItem(K+'_t', JSON.stringify(db.tasks));
        localStorage.setItem(K+'_u', db.url);
        localStorage.setItem(K+'_b', db.bg);
        localStorage.setItem(K+'_p', db.pr);
        localStorage.setItem(K+'_c', db.cv);
        render();
    }

    function addTask() {
        const t = document.getElementById('taskTitle').value;
        const s = document.getElementById('dS').value;
        const e = document.getElementById('dE').value;
        if(!t || !s || !e) return alert("กรอกข้อมูลให้ครบก่อนนะคะคุณน้ำทิพย์");
        
        db.tasks.push({ title: t, status: document.getElementById('taskStatus').value, s, e });
        document.getElementById('taskTitle').value = "";
        save();
    }

    function delT(i) { if(confirm("ลบงานนี้ใช่ไหมคะ?")) { db.tasks.splice(i, 1); save(); } }

    function render() {
        document.getElementById('bBody').style.backgroundImage = db.bg ? `url(${db.bg})` : "none";
        document.getElementById('dProf').src = db.pr || "https://via.placeholder.com/150?text=namtip";
        const cv = document.getElementById('dCov');
        if(db.cv) cv.style.backgroundImage = `url(${db.cv})`; else cv.style.backgroundColor = "#eee";

        const list = document.getElementById('tList');
        list.innerHTML = "";
        db.tasks.forEach((item, i) => {
            let st = item.status === 'ทำแล้ว' ? 'done' : '';
            list.innerHTML += `<div class="t-item">
                <div style="font-weight:bold; margin-bottom:5px; color:#333;">${item.title}</div>
                <span class="bdg ${st}">${item.status}</span>
                <small style="color:gray; margin-left:10px;">🗓️ ${item.s} - ${item.e}</small>
                <i class="fas fa-trash del" onclick="delT(${i})"></i>
            </div>`;
        });
        document.getElementById('uIn').value = db.url;
    }

    async function sendToSheet() {
        if(!db.url) return alert("ยังไม่ได้ใส่ URL ค่ะ (กดปุ่มสามขีดเพื่อใส่ลิงก์)");
        document.getElementById('syncMsg').innerText = "⏳ กำลังบันทึกลงตาราง...";
        try {
            await fetch(db.url, { method: 'POST', mode: 'no-cors', body: JSON.stringify({taskData: db.tasks}) });
            document.getElementById('syncMsg').innerText = "✅ บันทึกสำเร็จแล้วค่ะ!";
            setTimeout(() => document.getElementById('syncMsg').innerText = "", 4000);
        } catch(err) { alert("ล้มเหลว"); }
    }

    function resetAll() { if(confirm("ล้างข้อมูลและรูปทั้งหมดเลยใช่ไหมคะ?")) { localStorage.clear(); location.reload(); } }

    render();
</script>
</body>
</html>
