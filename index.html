<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>namtip - Task</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #fafafa; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; background-size: cover; background-attachment: fixed; }
        .header { width: 100%; max-width: 600px; background: white; padding: 15px 20px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 99; }
        .logo { font-size: 1.2rem; font-weight: bold; font-style: italic; }
        
        .container { width: 100%; max-width: 450px; padding: 20px; box-sizing: border-box; margin-bottom: 80px; }
        
        /* Profile */
        .profile-card { background: white; border-radius: 15px; border: 1px solid #ddd; overflow: hidden; margin-bottom: 20px; position: relative; }
        .cover { width: 100%; height: 100px; background: #eee; cursor: pointer; background-size: cover; background-position: center; }
        .p-pic-box { width: 70px; height: 70px; border-radius: 50%; border: 3px solid white; background: #ccc; position: absolute; top: 65px; left: 15px; overflow: hidden; cursor: pointer; z-index: 10; }
        .p-pic-box img { width: 100%; height: 100%; object-fit: cover; }
        .p-info { padding: 45px 15px 15px; }
        
        /* Form */
        .form-box { background: rgba(255,255,255,0.8); backdrop-filter: blur(5px); border-radius: 15px; padding: 15px; border: 1px solid #ddd; margin-bottom: 20px; }
        input, select { width: 100%; padding: 10px; margin: 5px 0 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        #taskTitle { border: 2px dashed #bbb; }
        .btn-add { width: 100%; padding: 12px; background: #ffccd5; color: #555; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* Task List */
        .task-item { background: white; border: 1px solid #ddd; border-radius: 12px; padding: 12px; margin-bottom: 10px; position: relative; }
        .badge { font-size: 0.7rem; padding: 3px 10px; border-radius: 10px; color: white; background: #888; }
        .badge.doing { background: #f1c40f; } .badge.done { background: #2ecc71; }
        .del-icon { position: absolute; right: 10px; top: 10px; color: #ccc; cursor: pointer; }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-inner { background: white; padding: 20px; border-radius: 20px; width: 280px; text-align: center; }

        .footer { position: fixed; bottom: 0; width: 100%; max-width: 600px; background: white; padding: 15px; text-align: center; font-size: 0.8rem; color: #888; border-top: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">namtip</div>
    <div>
        <i class="fas fa-paper-plane" style="margin-right:15px; cursor:pointer" onclick="sendData()"></i>
        <i class="fas fa-pencil-alt" style="margin-right:15px; cursor:pointer" onclick="showModal('themeModal')"></i>
        <i class="fas fa-bars" style="cursor:pointer" onclick="showModal('urlModal')"></i>
    </div>
</div>

<div class="container">
    <div class="profile-card">
        <div class="cover" id="displayCover" onclick="document.getElementById('upCover').click()"></div>
        <div class="p-pic-box" onclick="document.getElementById('upProf').click()">
            <img id="displayProf" src="https://via.placeholder.com/150">
        </div>
        <div class="p-info">
            <strong>namtip</strong><br><small style="color:#888">@namtip.p</small>
        </div>
    </div>

    <div class="form-box">
        <label style="font-size:0.8rem">ชื่อหัวข้องาน (เส้นประ)</label>
        <input type="text" id="taskTitle" placeholder="พิมพ์ชื่องาน...">
        <select id="taskStatus">
            <option>ยังไม่ทำ</option>
            <option>เริ่มทำ</option>
            <option>ทำแล้ว</option>
        </select>
        <div style="display:flex; gap:10px">
            <div style="flex:1"><small>เริ่ม</small><input type="date" id="dateS"></div>
            <div style="flex:1"><small>เสร็จ</small><input type="date" id="dateE"></div>
        </div>
        <button class="btn-add" onclick="addTask()">+ เพิ่มลงตาราง</button>
    </div>

    <div id="list"></div>
    <div id="statusMsg" style="text-align:center; font-size:0.7rem; color:gray"></div>
</div>

<input type="file" id="upCover" style="display:none" onchange="readImg(this, 'cover')">
<input type="file" id="upProf" style="display:none" onchange="readImg(this, 'prof')">
<input type="file" id="upBg" style="display:none" onchange="readImg(this, 'bg')">

<div id="urlModal" class="modal" onclick="if(event.target==this)this.style.display='none'">
    <div class="modal-inner">
        <h4>ตั้งค่า URL</h4>
        <input type="text" id="urlInput" placeholder="วางลิงก์ที่นี่" onchange="saveSetting()">
        <button class="btn-add" onclick="this.parentElement.parentElement.style.display='none'">ปิด</button>
    </div>
</div>

<div id="themeModal" class="modal" onclick="if(event.target==this)this.style.display='none'">
    <div class="modal-inner">
        <h4>ปรับแต่ง</h4>
        <button onclick="document.getElementById('upBg').click()" style="width:100%; padding:10px; margin-bottom:10px">อัปโหลดพื้นหลังเว็บ</button>
        <button onclick="localStorage.clear(); location.reload();" style="width:100%; padding:10px; background:#ffccd5; border:none">รีเซ็ตทั้งหมด</button>
    </div>
</div>

<div class="footer">@Rattana Garaked</div>

<script>
    const K = "vFINAL_NAMTIP";
    let tasks = JSON.parse(localStorage.getItem('t_'+K)) || [];
    let scriptUrl = localStorage.getItem('u_'+K) || "";
    let bImg = localStorage.getItem('bi_'+K) || "";
    let pImg = localStorage.getItem('pi_'+K) || "https://via.placeholder.com/150";
    let cImg = localStorage.getItem('ci_'+K) || "#eee";

    function showModal(id) { document.getElementById(id).style.display = 'flex'; }

    function readImg(input, type) {
        if (input.files[0]) {
            const r = new FileReader();
            r.onload = e => {
                if(type==='cover') cImg = e.target.result;
                if(type==='prof') pImg = e.target.
